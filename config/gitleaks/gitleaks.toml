title = "central-security-workflows"

[extend]
useDefault = true

[[rules]]
id = "generic-hardcoded-password"
description = "Possible hardcoded credential"
regex = '''(?i)(password|passwd|secret_key|api_key|access_key|token|bearer)[\s"'`:=]+[A-Za-z0-9_\-]{20,}'''
secretGroup = 0

[[rules]]
id = "generic-private-key"
description = "Possible private key file"
regex = '''-----BEGIN (?:RSA|EC|DSA|OPENSSH) PRIVATE KEY-----'''
