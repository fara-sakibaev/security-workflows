name: external-security-python
on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    uses: OWNER/security-workflows/.github/workflows/reusable-security.yml@FULL_COMMIT_SHA
    permissions:
      contents: read
      security-events: write
    with:
      profile: python
      upload_sarif: true
      working_directory: python
