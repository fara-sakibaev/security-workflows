name: validate-repository

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Required local-equivalent checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Bootstrap pinned validation and scanner tools
        shell: bash
        run: |
          set -euo pipefail
          make bootstrap

      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          make lint

      - name: Test scanner fixtures
        shell: bash
        run: |
          set -euo pipefail
          make test

      - name: Validate workflows, actions, configuration, and pins
        shell: bash
        run: |
          set -euo pipefail
          make validate
